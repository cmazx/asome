  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9.2
    container_name: tei
    ports:
      - "8881:80"
    volumes:
      - ./tei_data:/data
    environment:
      - OMP_NUM_THREADS=3
      - MKL_NUM_THREADS=3
      - MKL_DOMAIN_NUM_THREADS=MKL_BLAS=3
      - MKL_DYNAMIC=FALSE
      - OMP_DYNAMIC=FALSE
      - TOKIO_WORKER_THREADS=3
      - NUM_RAYON_THREADS=3
    command: >
      --model-id trollathon/bge-m3-safetensors
    deploy:
      resources:
        limits:
          cpus: '3.0'
    restart: unless-stopped
volumes:
  postgres_data18:
  ollama_data:
  tei_data:
