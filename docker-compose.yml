services:
  frontend:
    image: cmazx/asome:frontend
    container_name: asome-frontend
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
    restart: unless-stopped
  app:
    image: cmazx/asome:latest
    container_name: asome-app
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: asome
      DB_PASSWORD: asome
      DB_NAME: asome
      OLLAMA_BASE_URL: http://tei:80
    depends_on:
      postgres:
        condition: service_healthy
      tei:
        condition: service_started
    restart: unless-stopped
    ports:
      - "8880:8880"
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: asome-postgres
    environment:
      POSTGRES_DB: asome
      POSTGRES_USER: asome
      POSTGRES_PASSWORD: asome
    ports:
      - "5432:5432"
    volumes:
      - postgres_data18:/var/lib/postgresql
      - ./migration.sql:/docker-entrypoint-initdb.d/migration.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asome -d asome"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

